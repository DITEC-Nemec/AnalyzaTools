algorithm:
  algorithmList:
    - name: rozradenie_ziakov
      version: '1.0'
      importList:
        - local
        - Externe
      actorList:
        - namespaceAlias: local
          actor: SYSTEM
      behavior:
        description: Radí študentov podľa ich preferencií a kapacity škôl
        preconditionList:
          - Žiadosti od študentov sú dostupné
        postconditionList:
          - Priradenie je vytvorené a zaznamenané
      stepList:
        - id: '1'
          stepType: step
          description: Načítaj žiadosti od študentov
        - id: '2'
          stepType: decision
          description: Sú dostupné kapacity?
          condition:
            conditionType: simple
            description: Skontroluj dostupné miesta
            operatorType: exists
          branchList:
            - when: true
              then:
                - id: '3'
                  stepType: operation
                  description: Priraď študenta
                  operationRef: priradiStudenta
            - when: false
              then:
                - id: '4'
                  stepType: step
                  description: Oznám študentovi nedostupnosť
