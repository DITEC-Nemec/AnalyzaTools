meta:
  namespaceRef:
    - alias: local
      filePath: Example/Algoritm/rozradenie_ziakov.sqd.yaml
      sourceType: current
    - alias: Externe
      filePath: Catalogs/Externe.model.yaml
      sourceType: model
algorithm:
  definitions:
    - name: rozradenie_ziakov
      version: "1.0"
      imports:
        - local
        - Externe
      actors:
        - namespaceAlias: local
          actor: SYSTEM
      behavior:
        description: "Radí študentov podľa ich preferencií a kapacity škôl"
        preconditions:
          - "Žiadosti od študentov sú dostupné"
        postconditions:
          - "Priradenie je vytvorené a zaznamenané"
      steps:
        - id: '1'
          type: step
          text: "Načítaj žiadosti od študentov"
        - id: '2'
          type: decision
          text: "Sú dostupné kapacity?"
          condition:
            kind: simple
            description: "Skontroluj dostupné miesta"
            check: exists
          branches:
            - when: true
              then:
                - id: '3'
                  type: operation
                  text: "Priraď študenta"
                  operation: priradiStudenta
            - when: false
              then:
                - id: '4'
                  type: step
                  text: "Oznám študentovi nedostupnosť"
