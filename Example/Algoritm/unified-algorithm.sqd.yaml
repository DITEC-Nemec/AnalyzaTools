algorithm:
  name: EnrollStudent
  version: '1.0'
  behavior:
    description: Enroll a new student in the school
    preconditionList:
      - Student record exists
      - No prior enrollment in this school
    postconditionList:
      - Enrollment record created
      - Confirmation sent to student
    errorEventList: []
    affectedEntityList: []
    actorRefList: []
stepList:
  - id: '1'
    stepType: step
    description: Verify student data
  - id: '6'
    stepType: step
    description: ''
  - id: '2'
    stepType: decision
    description: Student already enrolled?
    condition:
      conditionType: attributeRef
      description: Check if student has enrollment record
      operatorType: exists
    branchList:
      - when: true
        then:
          - id: '3'
            stepType: step
            description: Log duplicate enrollment attempt
      - when: false
        then:
          - id: '4'
            stepType: operation
            description: Create enrollment record
            operationRef: create
  - id: '5'
    stepType: step
    description: Send confirmation to student
importList:
  - local
  - Externe
name: EnrollStudent
version: '1.0'
actorList:
  - namespaceAlias: local
    actor: STUDENT
  - namespaceAlias: local
    actor: SYSTEM
